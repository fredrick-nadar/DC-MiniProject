version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: dtq-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dtq-api
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_PATH: /app/data/tasks.db
      LOG_LEVEL: INFO
    volumes:
      - task_data:/app/data
    ports:
      - "8000:8000"
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_PATH: /app/data/tasks.db
      LOG_LEVEL: INFO
    volumes:
      - task_data:/app/data
    command: ["python", "worker.py"]
    depends_on:
      - redis
      - api
    restart: unless-stopped

  fault_manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dtq-fault-manager
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_PATH: /app/data/tasks.db
      LOG_LEVEL: INFO
    volumes:
      - task_data:/app/data
    command: ["python", "fault_manager.py"]
    depends_on:
      - redis
      - api
    restart: unless-stopped

volumes:
  task_data:
